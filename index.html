<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#ffffff"/>
<title>가계부</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;color:#111;}
#app{max-width:480px;margin:0 auto;min-height:100dvh;padding-bottom:68px;transition:background .4s ease;}
input,select{display:block;width:100%;padding:11px 14px;font-size:16px;border:0.5px solid #ddd;border-radius:10px;outline:none;font-family:inherit;color:#111;background:#fff;}
input:focus,select:focus{border-color:#555;}
button{font-family:inherit;cursor:pointer;}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:0.5px solid #eee;display:grid;grid-template-columns:repeat(3,1fr);z-index:50;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 12px;border:none;background:none;font-size:11px;color:#bbb;transition:color .15s;}
.nav-item.active{color:#111;}
.nav-item i{font-size:22px;}
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid rgba(0,0,0,0.06);background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);position:sticky;top:0;z-index:10;}
.nav-btn{background:none;border:none;padding:8px;color:#888;display:flex;align-items:center;justify-content:center;border-radius:8px;}
.nav-btn:active{background:rgba(0,0,0,0.06);}
.month-label{text-align:center;}
.month-label .year{font-size:12px;color:#888;margin:0;}
.month-label .month{font-size:20px;font-weight:600;margin:0;}
.nav-right{display:flex;align-items:center;gap:2px;}
.theme-btn{background:none;border:none;padding:8px;color:#888;display:flex;align-items:center;border-radius:8px;font-size:18px;}
.theme-btn:active{background:rgba(0,0,0,0.06);}
.past-banner{margin:12px 20px 0;padding:10px 14px;background:rgba(0,0,0,0.04);border-radius:10px;font-size:12px;color:#888;display:flex;align-items:center;gap:6px;}
.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 20px 12px;}
.summary-3{grid-template-columns:1fr 1fr 1fr;}
.summary-card{border-radius:12px;padding:12px 10px;background:rgba(255,255,255,0.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.s-label{font-size:11px;margin:0 0 4px;}
.s-val{font-size:14px;font-weight:600;margin:0;}
.s-default .s-label,.s-default .s-val{color:#555;}
.s-success{background:rgba(234,250,241,0.9);}
.s-success .s-label{color:#27ae60;}
.s-success .s-val{color:#1e8449;}
.s-warning{background:rgba(254,249,231,0.9);}
.s-warning .s-label{color:#e67e22;}
.s-warning .s-val{color:#d35400;}
.s-total{background:rgba(17,17,17,0.85);backdrop-filter:blur(8px);border-radius:14px;padding:14px 16px;margin:0 20px 16px;display:flex;justify-content:space-between;align-items:center;}
.s-total .tl{font-size:13px;color:#aaa;margin:0;}
.s-total .tv{font-size:18px;font-weight:700;color:#fff;margin:0;}
.progress-wrap{padding:0 20px 14px;}
.progress-meta{display:flex;justify-content:space-between;margin-bottom:5px;font-size:12px;}
.progress-meta span:first-child{color:#aaa;}
.progress-meta span:last-child{color:#666;font-weight:500;}
.progress-bar{height:6px;background:rgba(0,0,0,0.08);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:#27ae60;border-radius:3px;transition:width .4s ease;}
.section{margin:0 20px 18px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cat-badge{font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;}
.cat-meta{font-size:12px;color:#aaa;margin-left:6px;}
.cat-add-btn{background:none;border:none;display:flex;align-items:center;gap:3px;font-size:12px;padding:4px 8px;border-radius:6px;}
.items-card,.var-items-card{background:rgba(255,255,255,0.82);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:0.5px solid rgba(0,0,0,0.08);border-radius:14px;overflow:hidden;}
.item-empty,.var-empty{padding:18px 16px;text-align:center;font-size:13px;color:#bbb;}
.item-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:0.5px solid rgba(0,0,0,0.06);}
.item-row:last-child{border-bottom:none;}
.item-row.today-due{background:rgba(254,249,231,0.7);}
.check-btn{width:26px;height:26px;border-radius:50%;border:2px solid #ddd;background:transparent;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;}
.item-info{flex:1;min-width:0;}
.item-name{margin:0;font-size:15px;font-weight:500;color:#111;}
.item-name.paid{text-decoration:line-through;color:#bbb;}
.item-due-day{margin:0;font-size:12px;color:#bbb;}
.today-badge{font-size:10px;padding:2px 6px;border-radius:10px;background:#fef9e7;color:#e67e22;font-weight:500;border:0.5px solid #f5cba7;margin-left:5px;}
.item-amount{font-size:15px;font-weight:600;color:#111;}
.item-amount.paid{color:#ccc;}
.edit-btn,.var-edit{background:none;border:none;padding:4px;color:#bbb;display:flex;align-items:center;}
.unpaid-hint{margin:6px 0 0 4px;font-size:12px;}
.add-all-btn,.var-add-btn{width:100%;padding:14px;background:rgba(255,255,255,0.6);border:1.5px dashed rgba(0,0,0,0.15);border-radius:14px;color:#888;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px;}
.page-sections{padding:8px 20px 0;}
.var-list{padding:0 20px;}
.var-cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.var-info{flex:1;min-width:0;}
.var-desc{margin:0;font-size:15px;font-weight:500;color:#111;}
.var-cat{margin:0;font-size:12px;color:#bbb;}
.var-amount{font-size:15px;font-weight:600;color:#111;}
.var-item{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:0.5px solid rgba(0,0,0,0.06);}
.var-item:last-child{border-bottom:none;}
.date-group{margin-bottom:16px;}
.date-label{font-size:12px;color:#aaa;font-weight:500;margin-bottom:6px;}
.form-header{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid rgba(0,0,0,0.06);background:rgba(255,255,255,0.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);position:sticky;top:0;z-index:10;}
.back-btn{background:none;border:none;padding:6px;color:#888;display:flex;align-items:center;}
.form-title{font-size:18px;font-weight:600;margin:0;}
.form-body{padding:24px 20px;}
.field{margin-bottom:20px;}
.field-label{font-size:13px;color:#888;display:block;margin-bottom:8px;}
.field-label span{color:#bbb;}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.cat-btn-fixed{padding:13px 8px;border-radius:10px;font-size:13px;font-weight:500;}
.amount-preview{margin:6px 0 0;font-size:13px;color:#888;}
.form-actions{display:flex;gap:10px;margin-top:32px;}
.del-btn{flex:1;padding:15px;border-radius:10px;border:0.5px solid #e74c3c;background:#fdf2f2;color:#c0392b;font-size:15px;}
.save-btn{flex:2;padding:15px;border-radius:10px;border:none;background:#111;color:#fff;font-size:15px;font-weight:600;}
.cat-pills{display:flex;flex-wrap:wrap;gap:8px;}
.cat-pill{padding:8px 14px;border-radius:20px;border:0.5px solid #ddd;background:#fff;font-size:13px;color:#888;cursor:pointer;}
.home-section{padding:0 20px 16px;}
.home-section-title{font-size:13px;font-weight:600;color:#888;margin:0 0 10px;}
.home-fixed-item{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:0.5px solid rgba(0,0,0,0.06);}
.home-fixed-item:last-child{border-bottom:none;}
.theme-page{padding:0 0 32px;}
.theme-page-header{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid rgba(0,0,0,0.06);background:rgba(255,255,255,0.9);backdrop-filter:blur(12px);}
.theme-page-title{font-size:18px;font-weight:600;margin:0;}
.theme-section-label{font-size:13px;font-weight:600;color:#888;padding:20px 20px 10px;margin:0;}
.theme-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:0 20px;}
.theme-swatch{border:none;padding:0;background:none;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
.theme-swatch-circle{width:60px;height:60px;border-radius:50%;border:3px solid transparent;transition:all .2s;position:relative;display:flex;align-items:center;justify-content:center;}
.theme-swatch-circle.selected{border-color:#111;transform:scale(1.08);}
.theme-swatch-circle .check{position:absolute;width:22px;height:22px;background:#111;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.theme-swatch-label{font-size:11px;color:#888;}
.theme-preview-box{margin:20px 20px 0;border-radius:16px;overflow:hidden;border:0.5px solid rgba(0,0,0,0.08);}
.theme-preview-inner{padding:16px;transition:background .4s;}
.theme-preview-card{background:rgba(255,255,255,0.82);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.theme-preview-card:last-child{margin-bottom:0;}
</style>
</head>
<body>
<div id="app">
  <h1 class="sr-only">가계부</h1>
  <div id="root"></div>
  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>
<script>
const FIXED_CATS={hyundai:{label:"현대카드"},samsung:{label:"삼성카드"},other:{label:"기타 고정비"}};
const CC={hyundai:{bg:"#E6F1FB",text:"#185FA5",border:"#185FA5"},samsung:{bg:"#EEEDFE",text:"#534AB7",border:"#534AB7"},other:{bg:"#E1F5EE",text:"#0F6E56",border:"#0F6E56"}};
const VAR_CATS=["식비","카페","교통","쇼핑","의료","미용","문화","기타"];
const VAR_COLORS={"식비":"#e74c3c","카페":"#8e44ad","교통":"#2980b9","쇼핑":"#e67e22","의료":"#27ae60","미용":"#e91e63","문화":"#00bcd4","기타":"#95a5a6"};
const MONTHS=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
const THEMES=[
  {id:"default",label:"기본",bg:"#f5f5f5"},{id:"white",label:"화이트",bg:"#ffffff"},
  {id:"lavender",label:"라벤더",bg:"linear-gradient(160deg,#f3e5f5 0%,#ede7f6 100%)"},
  {id:"mint",label:"민트",bg:"linear-gradient(160deg,#e0f7fa 0%,#e8f5e9 100%)"},
  {id:"peach",label:"피치",bg:"linear-gradient(160deg,#fce4ec 0%,#fff3e0 100%)"},
  {id:"sky",label:"스카이",bg:"linear-gradient(160deg,#e3f2fd 0%,#e8eaf6 100%)"},
  {id:"cream",label:"크림",bg:"linear-gradient(160deg,#fffde7 0%,#fff8e1 100%)"},
  {id:"rose",label:"로즈",bg:"linear-gradient(160deg,#fce4ec 0%,#f8bbd9 100%)"},
  {id:"aqua",label:"아쿠아",bg:"linear-gradient(160deg,#e0f2f1 0%,#b2dfdb 100%)"},
  {id:"lilac",label:"라일락",bg:"linear-gradient(160deg,#ede7f6 0%,#d1c4e9 100%)"},
  {id:"sunset",label:"선셋",bg:"linear-gradient(160deg,#fff3e0 0%,#ffccbc 100%)"},
  {id:"forest",label:"포레스트",bg:"linear-gradient(160deg,#e8f5e9 0%,#c8e6c9 100%)"},
  {id:"dusk",label:"황혼",bg:"linear-gradient(160deg,#e8eaf6 0%,#fce4ec 100%)"},
  {id:"ocean",label:"오션",bg:"linear-gradient(160deg,#e1f5fe 0%,#b3e5fc 100%)"},
  {id:"blush",label:"블러쉬",bg:"linear-gradient(160deg,#f8bbd0 0%,#f3e5f5 100%)"},
  {id:"sage",label:"세이지",bg:"linear-gradient(160deg,#dcedc8 0%,#c5e1a5 100%)"},
];

function loadData(){try{return JSON.parse(localStorage.getItem("kgabu_v2")||"null");}catch{return null;}}
function saveData(d){try{localStorage.setItem("kgabu_v2",JSON.stringify(d));}catch{}}
function loadTheme(){return localStorage.getItem("kgabu_theme")||"default";}
function saveTheme(id){localStorage.setItem("kgabu_theme",id);}
function loadBgImg(){return localStorage.getItem("kgabu_bgimg")||null;}
function saveBgImg(dataUrl){try{localStorage.setItem("kgabu_bgimg",dataUrl);}catch(e){alert("사진 용량이 너무 커요. 더 작은 사진을 사용해주세요.");}}
function clearBgImg(){localStorage.removeItem("kgabu_bgimg");}

const now=new Date();
// Real current month key (never changes regardless of navigation)
function realMk(){return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;}

let state=loadData()||{fixedExpenses:[],payments:{},varExpenses:{},fixedByMonth:{}};
if(!state.varExpenses) state.varExpenses={};
if(!state.fixedByMonth) state.fixedByMonth={};

// ── MIGRATION: move old fixedExpenses into current month if fixedByMonth is empty ──
if(Object.keys(state.fixedByMonth).length===0 && state.fixedExpenses && state.fixedExpenses.length>0){
  state.fixedByMonth[realMk()]=JSON.parse(JSON.stringify(state.fixedExpenses));
  saveData(state);
}

let currentThemeId=loadTheme();
let customBgImg=loadBgImg();
let mainTab="home";
let view="main";
let editFixedItem=null,editVarItem=null;
let fixedForm={name:"",category:"hyundai",dueDay:"1",amount:""};
let varForm={date:"",description:"",category:"식비",amount:""};
let ym={y:now.getFullYear(),m:now.getMonth()};

function applyTheme(){
  const app=document.getElementById("app");
  if(customBgImg){
    app.style.background="url("+customBgImg+") center/cover no-repeat";
    document.body.style.background="#222";
  } else {
    const t=THEMES.find(t=>t.id===currentThemeId)||THEMES[0];
    app.style.background=t.bg;
    document.body.style.background=t.bg;
  }
}

// Current viewed month key
function mk(){return `${ym.y}-${String(ym.m+1).padStart(2,"0")}`;}

// Is the currently viewed month in the past?
function isPast(){return mk()<realMk();}

// Get fixed expenses for the currently viewed month.
// If this month has no snapshot yet, copy from the most recent available month.
function getFixedForMonth(){
  const m=mk();
  if(!state.fixedByMonth[m]){
    // Find most recent month with data at or before m
    const keys=Object.keys(state.fixedByMonth).sort().filter(k=>k<=m);
    const src=keys.length>0?state.fixedByMonth[keys[keys.length-1]]:(state.fixedExpenses||[]);
    state.fixedByMonth[m]=JSON.parse(JSON.stringify(src));
    saveData(state);
  }
  return state.fixedByMonth[m];
}

function saveFixed(newItems){
  const m=mk();
  state.fixedByMonth[m]=newItems;
  // Keep fixedExpenses in sync with the real current month for compatibility
  if(m===realMk()) state.fixedExpenses=newItems;
  save(state);
}

function save(nd){state=nd;saveData(nd);render();}
function isPaid(id){return !!((state.payments[mk()])||{})[id];}
function togglePaid(id){
  if(isPast()){return;} // can't change past payments
  const p={...state.payments,[mk()]:{...(state.payments[mk()]||{}),[id]:!isPaid(id)}};
  save({...state,payments:p});
}
function todayStr(){return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;}
function fmtDate(d){const p=d.split("-");return `${parseInt(p[1])}월 ${parseInt(p[2])}일`;}
function varForMonth(){return state.varExpenses[mk()]||[];}

function openAddFixed(cat){
  if(isPast())return;
  editFixedItem=null;fixedForm={name:"",category:cat||"hyundai",dueDay:"1",amount:""};view="fixedForm";render();
}
function openEditFixed(id){
  if(isPast())return;
  const fe=getFixedForMonth();
  editFixedItem=fe.find(e=>e.id===id);
  if(!editFixedItem)return;
  fixedForm={name:editFixedItem.name,category:editFixedItem.category,dueDay:String(editFixedItem.dueDay),amount:String(editFixedItem.amount)};
  view="fixedForm";render();
}
function submitFixed(){
  if(!fixedForm.name.trim()||!fixedForm.amount)return;
  const amount=parseInt(fixedForm.amount,10);if(isNaN(amount)||amount<=0)return;
  const dueDay=Math.min(Math.max(parseInt(fixedForm.dueDay)||1,1),31);
  const fe=getFixedForMonth();
  const newFe=editFixedItem
    ?fe.map(e=>e.id===editFixedItem.id?{...e,name:fixedForm.name.trim(),category:fixedForm.category,dueDay,amount}:e)
    :[...fe,{id:`f${Date.now()}`,name:fixedForm.name.trim(),category:fixedForm.category,dueDay,amount}];
  saveFixed(newFe);
  view="main";render();
}
function delFixed(){
  if(!editFixedItem)return;
  const fe=getFixedForMonth();
  saveFixed(fe.filter(e=>e.id!==editFixedItem.id));
  view="main";render();
}

function openAddVar(){editVarItem=null;varForm={date:todayStr(),description:"",category:"식비",amount:""};view="varForm";render();}
function openEditVar(id){const list=varForMonth();editVarItem=list.find(e=>e.id===id);if(!editVarItem)return;varForm={date:editVarItem.date,description:editVarItem.description,category:editVarItem.category,amount:String(editVarItem.amount)};view="varForm";render();}
function submitVar(){
  if(!varForm.description.trim()||!varForm.amount||!varForm.date)return;
  const amount=parseInt(varForm.amount,10);if(isNaN(amount)||amount<=0)return;
  const key=mk();const list=varForMonth();
  let newList=editVarItem?list.map(e=>e.id===editVarItem.id?{...e,date:varForm.date,description:varForm.description.trim(),category:varForm.category,amount}:e):[...list,{id:`v${Date.now()}`,date:varForm.date,description:varForm.description.trim(),category:varForm.category,amount}];
  newList.sort((a,b)=>a.date<b.date?1:-1);
  save({...state,varExpenses:{...state.varExpenses,[key]:newList}});view="main";render();
}
function delVar(){if(!editVarItem)return;const key=mk();save({...state,varExpenses:{...state.varExpenses,[key]:varForMonth().filter(e=>e.id!==editVarItem.id)}});view="main";render();}

function el(tag,attrs,...children){
  const e=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==="onClick") e.addEventListener("click",v);
    else if(k==="style") Object.assign(e.style,v);
    else if(k==="className") e.className=v;
    else if(k==="value") e.value=v;
    else if(k==="placeholder") e.placeholder=v;
    else if(k==="type") e.type=v;
    else if(k==="min") e.min=v;
    else if(k==="max") e.max=v;
    else e.setAttribute(k,v);
  });
  children.flat().forEach(c=>{if(c==null||c===false)return;e.appendChild(typeof c==="string"?document.createTextNode(c):c);});
  return e;
}
function ic(name,s){const i=document.createElement("i");i.className=`ti ti-${name}`;i.setAttribute("aria-hidden","true");if(s) Object.assign(i.style,s);return i;}

function renderNav(){
  const nav=document.getElementById("bottom-nav");nav.innerHTML="";
  [{key:"home",icon:"home",label:"홈"},{key:"fixed",icon:"credit-card",label:"고정비"},{key:"var",icon:"wallet",label:"변동지출"}].forEach(t=>{
    nav.appendChild(el("button",{className:"nav-item"+(mainTab===t.key&&view==="main"?" active":""),onClick:()=>{mainTab=t.key;view="main";render();}},ic(t.icon,{fontSize:"22px"}),el("span",{},t.label)));
  });
}

function renderMonthNav(){
  return el("div",{className:"month-nav"},
    el("button",{className:"nav-btn",onClick:()=>{ym=ym.m===0?{y:ym.y-1,m:11}:{...ym,m:ym.m-1};render();}},ic("chevron-left",{fontSize:"20px"})),
    el("div",{className:"month-label"},el("p",{className:"year"},String(ym.y)),el("p",{className:"month"},MONTHS[ym.m])),
    el("div",{className:"nav-right"},
      el("button",{className:"nav-btn",onClick:()=>{ym=ym.m===11?{y:ym.y+1,m:0}:{...ym,m:ym.m+1};render();}},ic("chevron-right",{fontSize:"20px"})),
      el("button",{className:"theme-btn",onClick:()=>{view="theme";render();}},ic("palette",{fontSize:"20px"}))
    )
  );
}

function makeSummaryCard(label,val,cls){
  return el("div",{className:"summary-card "+cls},el("p",{className:"s-label"},label),el("p",{className:"s-val"},typeof val==="string"?val:val.toLocaleString()+"원"));
}

// ── THEME PICKER ──
function renderThemePicker(){
  const wrap=el("div",{className:"theme-page"});
  wrap.appendChild(el("div",{className:"theme-page-header"},el("button",{className:"back-btn",onClick:()=>{view="main";render();}},ic("arrow-left",{fontSize:"22px"})),el("span",{className:"theme-page-title"},"배경 선택")));
  const curTheme=THEMES.find(t=>t.id===currentThemeId)||THEMES[0];
