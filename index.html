<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#ffffff"/>
<title>가계부</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f5f5f5;color:#111;}
#app{max-width:480px;margin:0 auto;background:#fff;min-height:100dvh;padding-bottom:68px;}
input,select{display:block;width:100%;padding:11px 14px;font-size:16px;border:0.5px solid #ddd;border-radius:10px;outline:none;font-family:inherit;color:#111;background:#fff;}
input:focus,select:focus{border-color:#555;}
button{font-family:inherit;cursor:pointer;}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:0.5px solid #eee;display:grid;grid-template-columns:repeat(3,1fr);z-index:50;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 12px;border:none;background:none;font-size:11px;color:#bbb;transition:color .15s;}
.nav-item.active{color:#111;}
.nav-item i{font-size:22px;}

/* Month nav */
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #eee;background:#fff;position:sticky;top:0;z-index:10;}
.nav-btn{background:none;border:none;padding:8px;color:#888;display:flex;align-items:center;justify-content:center;border-radius:8px;}
.nav-btn:active{background:#f0f0f0;}
.month-label{text-align:center;}
.month-label .year{font-size:12px;color:#888;margin:0;}
.month-label .month{font-size:20px;font-weight:600;margin:0;}

/* Summary */
.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 20px 12px;}
.summary-3{grid-template-columns:1fr 1fr 1fr;}
.summary-card{border-radius:10px;padding:12px 10px;}
.s-label{font-size:11px;margin:0 0 4px;}
.s-val{font-size:14px;font-weight:600;margin:0;}
.s-default{background:#f5f5f5;}
.s-default .s-label,.s-default .s-val{color:#555;}
.s-success{background:#eafaf1;}
.s-success .s-label{color:#27ae60;}
.s-success .s-val{color:#1e8449;}
.s-warning{background:#fef9e7;}
.s-warning .s-label{color:#e67e22;}
.s-warning .s-val{color:#d35400;}
.s-total{background:#111;border-radius:10px;padding:14px 16px;margin:0 20px 16px;display:flex;justify-content:space-between;align-items:center;}
.s-total .tl{font-size:13px;color:#aaa;margin:0;}
.s-total .tv{font-size:18px;font-weight:700;color:#fff;margin:0;}

/* Progress */
.progress-wrap{padding:0 20px 14px;}
.progress-meta{display:flex;justify-content:space-between;margin-bottom:5px;font-size:12px;}
.progress-meta span:first-child{color:#aaa;}
.progress-meta span:last-child{color:#666;font-weight:500;}
.progress-bar{height:6px;background:#eee;border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:#27ae60;border-radius:3px;transition:width .4s ease;}

/* Fixed expense sections */
.section{margin:0 20px 18px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cat-badge{font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;}
.cat-meta{font-size:12px;color:#aaa;margin-left:6px;}
.cat-add-btn{background:none;border:none;display:flex;align-items:center;gap:3px;font-size:12px;padding:4px 8px;border-radius:6px;}
.cat-add-btn:active{background:#f5f5f5;}
.items-card{background:#fff;border:0.5px solid #e5e5e5;border-radius:14px;overflow:hidden;}
.item-empty{padding:18px 16px;text-align:center;font-size:13px;color:#bbb;}
.item-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:0.5px solid #f0f0f0;}
.item-row:last-child{border-bottom:none;}
.item-row.today-due{background:#fef9e7;}
.check-btn{width:26px;height:26px;border-radius:50%;border:2px solid #ddd;background:transparent;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;}
.item-info{flex:1;min-width:0;}
.item-name{margin:0;font-size:15px;font-weight:500;color:#111;}
.item-name.paid{text-decoration:line-through;color:#bbb;}
.item-due-day{margin:0;font-size:12px;color:#bbb;}
.today-badge{font-size:10px;padding:2px 6px;border-radius:10px;background:#fef9e7;color:#e67e22;font-weight:500;border:0.5px solid #f5cba7;margin-left:5px;}
.item-amount{font-size:15px;font-weight:600;color:#111;}
.item-amount.paid{color:#ccc;}
.edit-btn{background:none;border:none;padding:4px;color:#bbb;display:flex;align-items:center;}
.unpaid-hint{margin:6px 0 0 4px;font-size:12px;}
.add-all-btn{width:100%;padding:14px;background:#f9f9f9;border:1.5px dashed #ddd;border-radius:14px;color:#888;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;margin:4px 0 28px;}
.add-all-btn:active{background:#f0f0f0;}
.page-sections{padding:8px 20px 0;}

/* Variable expenses */
.var-list{padding:0 20px;}
.var-add-btn{width:100%;padding:14px;background:#f9f9f9;border:1.5px dashed #ddd;border-radius:14px;color:#888;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px;}
.var-add-btn:active{background:#f0f0f0;}
.date-group{margin-bottom:16px;}
.date-label{font-size:12px;color:#aaa;font-weight:500;margin-bottom:6px;}
.var-items-card{background:#fff;border:0.5px solid #e5e5e5;border-radius:14px;overflow:hidden;}
.var-item{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:0.5px solid #f0f0f0;}
.var-item:last-child{border-bottom:none;}
.var-cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.var-info{flex:1;min-width:0;}
.var-desc{margin:0;font-size:15px;font-weight:500;color:#111;}
.var-cat{margin:0;font-size:12px;color:#bbb;}
.var-amount{font-size:15px;font-weight:600;color:#111;}
.var-edit{background:none;border:none;padding:4px;color:#bbb;display:flex;}
.var-empty{padding:32px 16px;text-align:center;font-size:13px;color:#bbb;}

/* Category pills */
.cat-pills{display:flex;flex-wrap:wrap;gap:8px;}
.cat-pill{padding:8px 14px;border-radius:20px;border:0.5px solid #ddd;background:#fff;font-size:13px;color:#888;cursor:pointer;}
.cat-pill.sel{border-width:2px;font-weight:600;}

/* Form */
.form-header{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid #eee;background:#fff;position:sticky;top:0;z-index:10;}
.back-btn{background:none;border:none;padding:6px;color:#888;display:flex;align-items:center;}
.form-title{font-size:18px;font-weight:600;margin:0;}
.form-body{padding:24px 20px;}
.field{margin-bottom:20px;}
.field-label{font-size:13px;color:#888;display:block;margin-bottom:8px;}
.field-label span{color:#bbb;}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.cat-btn-fixed{padding:13px 8px;border-radius:10px;font-size:13px;font-weight:500;}
.amount-preview{margin:6px 0 0;font-size:13px;color:#888;}
.form-actions{display:flex;gap:10px;margin-top:32px;}
.del-btn{flex:1;padding:15px;border-radius:10px;border:0.5px solid #e74c3c;background:#fdf2f2;color:#c0392b;font-size:15px;}
.del-btn:active{background:#f9d7d7;}
.save-btn{flex:2;padding:15px;border-radius:10px;border:none;background:#111;color:#fff;font-size:15px;font-weight:600;}
.save-btn:active{background:#333;}

/* Home tab */
.home-section{padding:0 20px 16px;}
.home-section-title{font-size:13px;font-weight:600;color:#888;margin:0 0 10px;}
.home-fixed-item{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:0.5px solid #f0f0f0;}
.home-fixed-item:last-child{border-bottom:none;}

@media(prefers-color-scheme:dark){
  body{background:#1a1a1a;color:#f0f0f0;}
  #app{background:#1c1c1e;}
  input,select{background:#2c2c2e;border-color:#3a3a3c;color:#f0f0f0;}
  input:focus,select:focus{border-color:#888;}
  .month-nav{background:#1c1c1e;border-bottom-color:#2c2c2e;}
  .month-label .year{color:#888;}
  .nav-btn{color:#888;}
  .bottom-nav{background:#1c1c1e;border-top-color:#2c2c2e;}
  .nav-item{color:#555;}
  .nav-item.active{color:#f0f0f0;}
  .s-default{background:#2c2c2e;}
  .s-default .s-label,.s-default .s-val{color:#aaa;}
  .s-success{background:#0d2b1a;}
  .s-success .s-label{color:#58d68d;}
  .s-success .s-val{color:#2ecc71;}
  .s-warning{background:#2d1f0e;}
  .s-warning .s-label{color:#f0a500;}
  .s-warning .s-val{color:#e67e22;}
  .s-total{background:#2c2c2e;}
  .s-total .tl{color:#666;}
  .s-total .tv{color:#f0f0f0;}
  .progress-bar{background:#2c2c2e;}
  .progress-meta span:first-child{color:#555;}
  .progress-meta span:last-child{color:#aaa;}
  .items-card,.var-items-card{background:#2c2c2e;border-color:#3a3a3c;}
  .item-row,.var-item{border-bottom-color:#3a3a3c;}
  .item-row.today-due{background:#2d1f0e;}
  .item-name,.var-desc{color:#f0f0f0;}
  .item-name.paid{color:#555;}
  .item-amount,.var-amount{color:#f0f0f0;}
  .item-amount.paid{color:#444;}
  .check-btn{border-color:#555;}
  .cat-meta,.var-cat{color:#555;}
  .item-empty,.var-empty{color:#555;}
  .edit-btn,.var-edit{color:#555;}
  .add-all-btn,.var-add-btn{background:#2c2c2e;border-color:#3a3a3c;color:#666;}
  .form-header{background:#1c1c1e;border-bottom-color:#2c2c2e;}
  .back-btn{color:#888;}
  .field-label{color:#888;}
  .cat-btn-fixed{background:#2c2c2e!important;border-color:#3a3a3c!important;}
  .del-btn{background:#2d1212;border-color:#7b2222;color:#ff6b6b;}
  .save-btn{background:#f0f0f0;color:#111;}
  .today-badge{background:#2d1f0e;color:#e67e22;border-color:#7d4a1e;}
  .cat-pill{background:#2c2c2e;border-color:#3a3a3c;color:#aaa;}
  .date-label{color:#666;}
  .home-fixed-item{border-bottom-color:#2c2c2e;}
  .home-section-title{color:#666;}
  .unpaid-hint{color:#aaa;}
}
</style>
</head>
<body>
<div id="app">
  <h1 class="sr-only">가계부</h1>
  <div id="root"></div>
  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<script>
const FIXED_CATS = {
  hyundai:{ label:"현대카드" },
  samsung:{ label:"삼성카드" },
  other:  { label:"기타 고정비" },
};
const CC = {
  hyundai:{ bg:"#E6F1FB", text:"#185FA5", border:"#185FA5" },
  samsung:{ bg:"#EEEDFE", text:"#534AB7", border:"#534AB7" },
  other:  { bg:"#E1F5EE", text:"#0F6E56", border:"#0F6E56" },
};
const VAR_CATS = ["식비","카페","교통","쇼핑","의료","미용","문화","기타"];
const VAR_COLORS = {
  "식비":"#e74c3c","카페":"#8e44ad","교통":"#2980b9","쇼핑":"#e67e22",
  "의료":"#27ae60","미용":"#e91e63","문화":"#00bcd4","기타":"#95a5a6"
};
const MONTHS = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

function loadData(){ try{ return JSON.parse(localStorage.getItem("kgabu_v2")||"null"); }catch{ return null; } }
function saveData(d){ try{ localStorage.setItem("kgabu_v2",JSON.stringify(d)); }catch{} }

let state = loadData() || { fixedExpenses:[], payments:{}, varExpenses:{} };
// migrate old data
if (!state.varExpenses) state.varExpenses = {};

let mainTab = "home"; // home | fixed | var
let view = "main";    // main | fixedForm | varForm
let editFixedItem = null;
let editVarItem = null;
let fixedForm = { name:"", category:"hyundai", dueDay:"1", amount:"" };
let varForm = { date:"", description:"", category:"식비", amount:"" };
const now = new Date();
let ym = { y:now.getFullYear(), m:now.getMonth() };

function save(nd){ state=nd; saveData(nd); render(); }
function mk(){ return `${ym.y}-${String(ym.m+1).padStart(2,"0")}`; }
function isPaid(id){ return !!((state.payments[mk()])||{})[id]; }
function togglePaid(id){
  const p={...state.payments,[mk()]:{...(state.payments[mk()]||{}),[id]:!isPaid(id)}};
  save({...state,payments:p});
}
function todayStr(){
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;
}
function fmtDate(d){
  const parts=d.split("-"); return `${parseInt(parts[1])}월 ${parseInt(parts[2])}일`;
}
function varForMonth(){ return state.varExpenses[mk()]||[]; }

function openAddFixed(cat){
  editFixedItem=null;
  fixedForm={name:"",category:cat||"hyundai",dueDay:"1",amount:""};
  view="fixedForm"; render();
}
function openEditFixed(id){
  editFixedItem=state.fixedExpenses.find(e=>e.id===id);
  if(!editFixedItem) return;
  fixedForm={name:editFixedItem.name,category:editFixedItem.category,dueDay:String(editFixedItem.dueDay),amount:String(editFixedItem.amount)};
  view="fixedForm"; render();
}
function submitFixed(){
  if(!fixedForm.name.trim()||!fixedForm.amount) return;
  const amount=parseInt(fixedForm.amount,10);
  if(isNaN(amount)||amount<=0) return;
  const dueDay=Math.min(Math.max(parseInt(fixedForm.dueDay)||1,1),31);
  const fe=editFixedItem
    ? state.fixedExpenses.map(e=>e.id===editFixedItem.id?{...e,name:fixedForm.name.trim(),category:fixedForm.category,dueDay,amount}:e)
    : [...state.fixedExpenses,{id:`f${Date.now()}`,name:fixedForm.name.trim(),category:fixedForm.category,dueDay,amount}];
  save({...state,fixedExpenses:fe});
  view="main"; render();
}
function delFixed(){
  if(!editFixedItem) return;
  save({...state,fixedExpenses:state.fixedExpenses.filter(e=>e.id!==editFixedItem.id)});
  view="main"; render();
}

function openAddVar(){
  editVarItem=null;
  varForm={date:todayStr(),description:"",category:"식비",amount:""};
  view="varForm"; render();
}
function openEditVar(id){
  const list=varForMonth();
  editVarItem=list.find(e=>e.id===id);
  if(!editVarItem) return;
  varForm={date:editVarItem.date,description:editVarItem.description,category:editVarItem.category,amount:String(editVarItem.amount)};
  view="varForm"; render();
}
function submitVar(){
  if(!varForm.description.trim()||!varForm.amount||!varForm.date) return;
  const amount=parseInt(varForm.amount,10);
  if(isNaN(amount)||amount<=0) return;
  const key=mk();
  const list=varForMonth();
  let newList;
  if(editVarItem){
    newList=list.map(e=>e.id===editVarItem.id?{...e,date:varForm.date,description:varForm.description.trim(),category:varForm.category,amount}:e);
  } else {
    newList=[...list,{id:`v${Date.now()}`,date:varForm.date,description:varForm.description.trim(),category:varForm.category,amount}];
  }
  newList.sort((a,b)=>a.date<b.date?1:-1);
  save({...state,varExpenses:{...state.varExpenses,[key]:newList}});
  view="main"; render();
}
function delVar(){
  if(!editVarItem) return;
  const key=mk();
  const newList=varForMonth().filter(e=>e.id!==editVarItem.id);
  save({...state,varExpenses:{...state.varExpenses,[key]:newList}});
  view="main"; render();
}

// DOM helpers
function el(tag,attrs,...children){
  const e=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==="onClick") e.addEventListener("click",v);
    else if(k==="style") Object.assign(e.style,v);
    else if(k==="className") e.className=v;
    else if(k==="value"){ e.value=v; }
    else if(k==="placeholder") e.placeholder=v;
    else if(k==="type") e.type=v;
    else if(k==="min") e.min=v;
    else if(k==="max") e.max=v;
    else e.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if(c==null||c===false) return;
    e.appendChild(typeof c==="string"?document.createTextNode(c):c);
  });
  return e;
}
function ic(name,s){ const i=document.createElement("i"); i.className=`ti ti-${name}`; i.setAttribute("aria-hidden","true"); if(s) Object.assign(i.style,s); return i; }

function renderNav(){
  const nav=document.getElementById("bottom-nav");
  nav.innerHTML="";
  const tabs=[
    {key:"home",icon:"home",label:"홈"},
    {key:"fixed",icon:"credit-card",label:"고정비"},
    {key:"var",icon:"wallet",label:"변동지출"},
  ];
  tabs.forEach(t=>{
    const btn=el("button",{className:"nav-item"+(mainTab===t.key?" active":""),onClick:()=>{ mainTab=t.key; view="main"; render(); }},
      ic(t.icon,{fontSize:"22px"}), el("span",{},t.label)
    );
    nav.appendChild(btn);
  });
}

function renderMonthNav(onPrev,onNext){
  return el("div",{className:"month-nav"},
    el("button",{className:"nav-btn",onClick:onPrev},ic("chevron-left",{fontSize:"20px"})),
    el("div",{className:"month-label"},
      el("p",{className:"year"},String(ym.y)),
      el("p",{className:"month"},MONTHS[ym.m])
    ),
    el("button",{className:"nav-btn",onClick:onNext},ic("chevron-right",{fontSize:"20px"}))
  );
}
function prevM(){ ym=ym.m===0?{y:ym.y-1,m:11}:{...ym,m:ym.m-1}; render(); }
function nextM(){ ym=ym.m===11?{y:ym.y+1,m:0}:{...ym,m:ym.m+1}; render(); }

// ── HOME TAB ──
function renderHome(){
  const fe=state.fixedExpenses;
  const varList=varForMonth();
  const totalFixed=fe.reduce((s,e)=>s+e.amount,0);
  const totalVar=varList.reduce((s,e)=>s+e.amount,0);
  const totalPaid=fe.filter(e=>isPaid(e.id)).reduce((s,e)=>s+e.amount,0);
  const unpaidFixed=totalFixed-totalPaid;

  const wrap=document.createElement("div");
  wrap.appendChild(renderMonthNav(prevM,nextM));

  // Total card
  const totalCard=el("div",{className:"s-total"},
    el("p",{className:"tl"},"이번 달 지출 합계"),
    el("p",{className:"tv"},(totalPaid+totalVar).toLocaleString()+"원")
  );
  wrap.appendChild(totalCard);

  // 2x2 summary
  const sum=el("div",{className:"summary summary-3"},
    makeSummaryCard("고정 납부",totalPaid,"s-success"),
    makeSummaryCard("고정 미납",unpaidFixed,unpaidFixed>0?"s-warning":"s-default"),
    makeSummaryCard("변동 지출",totalVar,"s-default")
  );
  wrap.appendChild(sum);

  // Card grouped summary
  if(fe.length>0){
    const sec=el("div",{className:"home-section"},
      el("p",{className:"home-section-title"},"💳 카드별 고정비")
    );
    const card=el("div",{className:"items-card"});
    ["hyundai","samsung","other"].forEach((cat,idx)=>{
      const items=fe.filter(e=>e.category===cat);
      if(!items.length) return;
      const cc=CC[cat];
      const catTotal=items.reduce((s,e)=>s+e.amount,0);
      const catPaid=items.filter(e=>isPaid(e.id)).reduce((s,e)=>s+e.amount,0);
      const catUnpaid=catTotal-catPaid;
      const paidCnt=items.filter(e=>isPaid(e.id)).length;
      const isLast=["hyundai","samsung","other"].filter(c=>fe.some(e=>e.category===c)).slice(-1)[0]===cat;
      const row=el("div",{className:"home-fixed-item",style:{borderBottom:isLast?"none":"0.5px solid #f0f0f0",cursor:"pointer"},onClick:()=>{mainTab="fixed";view="main";render();}});

      const badge=el("span",{style:{fontSize:"11px",fontWeight:600,padding:"3px 8px",borderRadius:"12px",background:cc.bg,color:cc.text,marginRight:"8px",flexShrink:0}},FIXED_CATS[cat].label);
      const info=el("div",{style:{flex:1,minWidth:0}});
      const nameRow=el("div",{style:{display:"flex",alignItems:"center"}},badge);
      const subTxt=el("p",{style:{margin:"3px 0 0",fontSize:"12px",color:"#bbb"}},`${paidCnt}/${items.length}건 납부`);
      info.appendChild(nameRow); info.appendChild(subTxt);
      row.appendChild(info);

      const right=el("div",{style:{textAlign:"right",flexShrink:0}});
      right.appendChild(el("p",{style:{margin:0,fontSize:"15px",fontWeight:600}},catTotal.toLocaleString()+"원"));
      if(catUnpaid>0){
        right.appendChild(el("p",{style:{margin:"2px 0 0",fontSize:"11px",color:"#e67e22"}},`미납 ${catUnpaid.toLocaleString()}원`));
      } else {
        right.appendChild(el("p",{style:{margin:"2px 0 0",fontSize:"11px",color:"#27ae60"}},"납부 완료"));
      }
      row.appendChild(right);
      card.appendChild(row);
    });
    sec.appendChild(card);
    wrap.appendChild(sec);
  }

  // Recent var expenses
  const recent=varList.slice(0,5);
  if(recent.length>0){
    const sec=el("div",{className:"home-section"},
      el("p",{className:"home-section-title"},"🧾 최근 변동 지출")
    );
    const card=el("div",{className:"var-items-card"});
    recent.forEach(item=>{
      const dot=el("div",{className:"var-cat-dot",style:{background:VAR_COLORS[item.category]||"#bbb"}});
      const row=el("div",{className:"var-item"},
        dot,
        el("div",{className:"var-info"},
          el("p",{className:"var-desc"},item.description),
          el("p",{className:"var-cat"},item.category+" · "+fmtDate(item.date))
        ),
        el("span",{className:"var-amount"},item.amount.toLocaleString()+"원")
      );
      card.appendChild(row);
    });
    sec.appendChild(card);
    wrap.appendChild(sec);
  }

  return wrap;
}

function makeSummaryCard(label,val,cls){
  return el("div",{className:"summary-card "+cls},
    el("p",{className:"s-label"},label),
    el("p",{className:"s-val"},val.toLocaleString()+"원")
  );
}

// ── FIXED TAB ──
function renderFixed(){
  const fe=state.fixedExpenses;
  const totalFixed=fe.reduce((s,e)=>s+e.amount,0);
  const totalPaid=fe.filter(e=>isPaid(e.id)).reduce((s,e)=>s+e.amount,0);
  const paidCount=fe.filter(e=>isPaid(e.id)).length;
  const pct=fe.length?Math.round(paidCount/fe.length*100):0;

  const wrap=document.createElement("div");
  wrap.appendChild(renderMonthNav(prevM,nextM));

  const sum=el("div",{className:"summary summary-3"},
    makeSummaryCard("총 고정비",totalFixed,"s-default"),
    makeSummaryCard("납부 완료",totalPaid,"s-success"),
    makeSummaryCard("미납",totalFixed-totalPaid,totalFixed-totalPaid>0?"s-warning":"s-default")
  );
  wrap.appendChild(sum);

  if(fe.length>0){
    const pw=el("div",{className:"progress-wrap"},
      el("div",{className:"progress-meta"},el("span",{},"납부 진행률"),el("span",{},`${pct}% (${paidCount}/${fe.length}건)`)),
      el("div",{className:"progress-bar"},el("div",{className:"progress-fill",style:{width:pct+"%"}}))
    );
    wrap.appendChild(pw);
  }

  const secs=el("div",{className:"page-sections"});
  Object.entries(FIXED_CATS).forEach(([cat,catInfo])=>{
    const items=fe.filter(e=>e.category===cat).sort((a,b)=>a.dueDay-b.dueDay);
    const catTotal=items.reduce((s,e)=>s+e.amount,0);
    const catPaid=items.filter(e=>isPaid(e.id)).reduce((s,e)=>s+e.amount,0);
    const cc=CC[cat];
    const unpaid=items.filter(e=>!isPaid(e.id));

    const sec=el("div",{className:"section"});
    const badge=el("span",{className:"cat-badge",style:{background:cc.bg,color:cc.text}},catInfo.label);
    const meta=items.length>0?el("span",{className:"cat-meta"},`${catPaid.toLocaleString()} / ${catTotal.toLocaleString()}원`):null;
    const addBtn=el("button",{className:"cat-add-btn",style:{color:cc.text},onClick:(e)=>{e.stopPropagation();openAddFixed(cat);}},ic("plus",{fontSize:"14px"})," 추가");
    const leftDiv=document.createElement("div"); leftDiv.style.display="flex"; leftDiv.style.alignItems="center";
    leftDiv.appendChild(badge); if(meta) leftDiv.appendChild(meta);
    sec.appendChild(el("div",{className:"section-header"},leftDiv,addBtn));

    const card=el("div",{className:"items-card"});
    if(!items.length){ card.appendChild(el("div",{className:"item-empty"},"항목이 없습니다")); }
    else items.forEach((item,idx)=>{
      const paid=isPaid(item.id);
      const isToday=item.dueDay===now.getDate()&&ym.m===now.getMonth()&&ym.y===now.getFullYear();
      const row=el("div",{className:"item-row"+(isToday&&!paid?" today-due":"")});
      const chk=document.createElement("button"); chk.className="check-btn";
      chk.style.border=`2px solid ${paid?cc.border:"#ddd"}`; chk.style.background=paid?cc.bg:"transparent";
      if(paid) chk.appendChild(ic("check",{fontSize:"13px",color:cc.text}));
      chk.addEventListener("click",()=>togglePaid(item.id)); row.appendChild(chk);
      const info=el("div",{className:"item-info"});
      const nr=document.createElement("div"); nr.style.display="flex"; nr.style.alignItems="center";
      nr.appendChild(el("p",{className:"item-name"+(paid?" paid":"")},item.name));
      if(isToday&&!paid) nr.appendChild(el("span",{className:"today-badge"},"오늘"));
      info.appendChild(nr); info.appendChild(el("p",{className:"item-due-day"},`매월 ${item.dueDay}일`));
      row.appendChild(info);
      row.appendChild(el("span",{className:"item-amount"+(paid?" paid":"")},item.amount.toLocaleString()+"원"));
      row.appendChild(el("button",{className:"edit-btn",onClick:(e)=>{e.stopPropagation();openEditFixed(item.id);}},ic("pencil",{fontSize:"16px"})));
      card.appendChild(row);
    });
    sec.appendChild(card);
    if(unpaid.length>0){
      const hint=document.createElement("p"); hint.className="unpaid-hint"; hint.style.color=cc.text;
      hint.appendChild(ic("clock",{fontSize:"12px",verticalAlign:"-1px",marginRight:"3px"}));
      hint.appendChild(document.createTextNode(` 미납 ${unpaid.length}건 · 가장 빠른 납부일: ${unpaid[0].dueDay}일`));
      sec.appendChild(hint);
    }
    secs.appendChild(sec);
  });

  const addAllWrap=document.createElement("div"); addAllWrap.style.padding="4px 20px 0";
  addAllWrap.appendChild(el("button",{className:"add-all-btn",onClick:()=>openAddFixed()},ic("plus",{fontSize:"18px"})," 새 항목 추가"));
  secs.appendChild(addAllWrap);
  wrap.appendChild(secs);
  return wrap;
}

// ── VAR TAB ──
function renderVar(){
  const list=varForMonth();
  const total=list.reduce((s,e)=>s+e.amount,0);

  const wrap=document.createElement("div");
  wrap.appendChild(renderMonthNav(prevM,nextM));

  // Summary
  const sum=el("div",{className:"summary"},
    makeSummaryCard("이번 달 변동지출",total,"s-default"),
    makeSummaryCard("건수",list.length+"건","s-default")
  );
  wrap.appendChild(sum);

  // Category breakdown
  if(list.length>0){
    const byCat={};
    list.forEach(e=>{ byCat[e.category]=(byCat[e.category]||0)+e.amount; });
    const breakdown=el("div",{style:{padding:"0 20px 16px",display:"flex",flexWrap:"wrap",gap:"8px"}});
    Object.entries(byCat).sort((a,b)=>b[1]-a[1]).forEach(([cat,amt])=>{
      const dot=el("span",{style:{display:"inline-block",width:"7px",height:"7px",borderRadius:"50%",background:VAR_COLORS[cat]||"#bbb",marginRight:"5px",verticalAlign:"1px"}});
      const pill=el("span",{style:{display:"inline-flex",alignItems:"center",padding:"5px 12px",borderRadius:"20px",background:"#f5f5f5",fontSize:"13px",color:"#555"}},dot,`${cat} ${amt.toLocaleString()}원`);
      breakdown.appendChild(pill);
    });
    wrap.appendChild(breakdown);
  }

  const varList=el("div",{className:"var-list"});
  varList.appendChild(el("button",{className:"var-add-btn",onClick:openAddVar},ic("plus",{fontSize:"18px"})," 지출 추가"));

  if(!list.length){
    varList.appendChild(el("div",{className:"var-empty"},ic("receipt",{fontSize:"32px",display:"block",margin:"0 auto 8px",color:"#ddd"}),"이번 달 변동 지출이 없어요"));
  } else {
    // Group by date
    const grouped={};
    list.forEach(e=>{ if(!grouped[e.date]) grouped[e.date]=[]; grouped[e.date].push(e); });
    Object.entries(grouped).sort((a,b)=>a[0]<b[0]?1:-1).forEach(([date,items])=>{
      const grp=el("div",{className:"date-group"},el("div",{className:"date-label"},fmtDate(date)));
      const card=el("div",{className:"var-items-card"});
      items.forEach(item=>{
        const dot=el("div",{className:"var-cat-dot",style:{background:VAR_COLORS[item.category]||"#bbb"}});
        const row=el("div",{className:"var-item"},
          dot,
          el("div",{className:"var-info"},el("p",{className:"var-desc"},item.description),el("p",{className:"var-cat"},item.category)),
          el("span",{className:"var-amount"},item.amount.toLocaleString()+"원"),
          el("button",{className:"var-edit",onClick:(e)=>{e.stopPropagation();openEditVar(item.id);}},ic("pencil",{fontSize:"16px"}))
        );
        card.appendChild(row);
      });
      grp.appendChild(card); varList.appendChild(grp);
    });
  }
  wrap.appendChild(varList);
  return wrap;
}

// ── FIXED FORM ──
function renderFixedForm(){
  const wrap=document.createElement("div");
  const hdr=el("div",{className:"form-header"},
    el("button",{className:"back-btn",onClick:()=>{view="main";render();}},ic("arrow-left",{fontSize:"22px"})),
    el("span",{className:"form-title"},editFixedItem?"항목 수정":"새 항목 추가")
  );
  wrap.appendChild(hdr);
  const body=el("div",{className:"form-body"});

  // Category
  const catF=el("div",{className:"field"},el("label",{className:"field-label"},"카드 / 구분"));
  const catGrid=el("div",{className:"cat-grid"});
  Object.entries(FIXED_CATS).forEach(([k,c])=>{
    const sel=fixedForm.category===k; const cc=CC[k];
    const btn=el("button",{className:"cat-btn-fixed",style:{border:`${sel?"2px":"0.5px"} solid ${sel?cc.border:"#ddd"}`,background:sel?cc.bg:"#fff",color:sel?cc.text:"#888"},onClick:()=>{fixedForm.category=k;rerenderFixedForm(wrap);}},c.label);
    catGrid.appendChild(btn);
  });
  catF.appendChild(catGrid); body.appendChild(catF);

  const nameF=el("div",{className:"field"},el("label",{className:"field-label"},"항목명"));
  const nameIn=el("input",{type:"text",placeholder:"예: 넷플릭스, 보험료, 통신비",value:fixedForm.name});
  nameIn.addEventListener("input",e=>{fixedForm.name=e.target.value;});
  nameF.appendChild(nameIn); body.appendChild(nameF);

  const dueF=el("div",{className:"field"});
  const dueLbl=document.createElement("label"); dueLbl.className="field-label"; dueLbl.innerHTML="납부일 <span>(매월 며칠)</span>"; dueF.appendChild(dueLbl);
  const dueIn=el("input",{type:"number",min:"1",max:"31",placeholder:"15",value:fixedForm.dueDay});
  dueIn.addEventListener("input",e=>{fixedForm.dueDay=e.target.value;});
  dueF.appendChild(dueIn); body.appendChild(dueF);

  const amtF=el("div",{className:"field"});
  const amtLbl=document.createElement("label"); amtLbl.className="field-label"; amtLbl.innerHTML="금액 <span>(원)</span>"; amtF.appendChild(amtLbl);
  const amtIn=el("input",{type:"number",placeholder:"0",value:fixedForm.amount});
  amtIn.addEventListener("input",e=>{fixedForm.amount=e.target.value;});
  amtF.appendChild(amtIn);
  if(fixedForm.amount&&!isNaN(parseInt(fixedForm.amount))) amtF.appendChild(el("p",{className:"amount-preview"},parseInt(fixedForm.amount).toLocaleString()+"원 / 월"));
  body.appendChild(amtF);

  const acts=el("div",{className:"form-actions"},
    ...(editFixedItem?[el("button",{className:"del-btn",onClick:delFixed},"삭제")]:[] ),
    el("button",{className:"save-btn",onClick:submitFixed},editFixedItem?"저장하기":"추가하기")
  );
  body.appendChild(acts);
  wrap.appendChild(body);
  return wrap;
}
function rerenderFixedForm(old){ old.replaceWith(renderFixedForm()); }

// ── VAR FORM ──
function renderVarForm(){
  const wrap=document.createElement("div");
  const hdr=el("div",{className:"form-header"},
    el("button",{className:"back-btn",onClick:()=>{view="main";render();}},ic("arrow-left",{fontSize:"22px"})),
    el("span",{className:"form-title"},editVarItem?"지출 수정":"지출 추가")
  );
  wrap.appendChild(hdr);
  const body=el("div",{className:"form-body"});

  // Date
  const dateF=el("div",{className:"field"},el("label",{className:"field-label"},"날짜"));
  const dateIn=el("input",{type:"date",value:varForm.date});
  dateIn.addEventListener("input",e=>{varForm.date=e.target.value;});
  dateF.appendChild(dateIn); body.appendChild(dateF);

  // Description
  const descF=el("div",{className:"field"},el("label",{className:"field-label"},"내용"));
  const descIn=el("input",{type:"text",placeholder:"예: 점심 식사, 택시비",value:varForm.description});
  descIn.addEventListener("input",e=>{varForm.description=e.target.value;});
  descF.appendChild(descIn); body.appendChild(descF);

  // Category pills
  const catF=el("div",{className:"field"},el("label",{className:"field-label"},"분류"));
  const pills=el("div",{className:"cat-pills"});
  VAR_CATS.forEach(cat=>{
    const sel=varForm.category===cat;
    const color=VAR_COLORS[cat]||"#bbb";
    const pill=el("button",{className:"cat-pill"+(sel?" sel":""),
      style:sel?{borderColor:color,background:color+"22",color:color}:{},
      onClick:()=>{varForm.category=cat;rerenderVarForm(wrap);}},cat);
    pills.appendChild(pill);
  });
  catF.appendChild(pills); body.appendChild(catF);

  // Amount
  const amtF=el("div",{className:"field"});
  const amtLbl=document.createElement("label"); amtLbl.className="field-label"; amtLbl.innerHTML="금액 <span>(원)</span>"; amtF.appendChild(amtLbl);
  const amtIn=el("input",{type:"number",placeholder:"0",value:varForm.amount});
  amtIn.addEventListener("input",e=>{varForm.amount=e.target.value;});
  amtF.appendChild(amtIn);
  if(varForm.amount&&!isNaN(parseInt(varForm.amount))) amtF.appendChild(el("p",{className:"amount-preview"},parseInt(varForm.amount).toLocaleString()+"원"));
  body.appendChild(amtF);

  const acts=el("div",{className:"form-actions"},
    ...(editVarItem?[el("button",{className:"del-btn",onClick:delVar},"삭제")]:[] ),
    el("button",{className:"save-btn",onClick:submitVar},editVarItem?"저장하기":"추가하기")
  );
  body.appendChild(acts);
  wrap.appendChild(body);
  return wrap;
}
function rerenderVarForm(old){ old.replaceWith(renderVarForm()); }

function render(){
  renderNav();
  const root=document.getElementById("root");
  root.innerHTML="";
  if(view==="fixedForm"){ root.appendChild(renderFixedForm()); return; }
  if(view==="varForm"){ root.appendChild(renderVarForm()); return; }
  if(mainTab==="home") root.appendChild(renderHome());
  else if(mainTab==="fixed") root.appendChild(renderFixed());
  else if(mainTab==="var") root.appendChild(renderVar());
}

render();
</script>
</body>
</html>
